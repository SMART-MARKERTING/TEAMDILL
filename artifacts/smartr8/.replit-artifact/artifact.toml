kind = "web"
previewPath = "/"
title = "SMARTR8 — Adaxa Home Lead Funnel"
version = "1.0.0"
id = "artifacts/smartr8"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24180

[services.development]
run = "pnpm --filter @workspace/smartr8 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartr8", "run", "build" ]
publicDir = "artifacts/smartr8/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24180"
BASE_PATH = "/"
